services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: agent_platform
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  orchestrator-api:
    build:
      context: ./services/orchestrator-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://agent:agent@postgres:5432/agent_platform
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DEFAULT_ACTOR_ID: owner
      MAC_RUNNER_URL: ${MAC_RUNNER_URL:-}
      MAC_RUNNER_TOKEN: ${MAC_RUNNER_TOKEN:-}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ./services/orchestrator-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://agent:agent@postgres:5432/agent_platform
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DEFAULT_ACTOR_ID: owner
      MAC_RUNNER_URL: ${MAC_RUNNER_URL:-}
      MAC_RUNNER_TOKEN: ${MAC_RUNNER_TOKEN:-}
    command: celery -A app.worker.celery_app worker --loglevel=INFO
    depends_on:
      - orchestrator-api
      - postgres
      - redis
    restart: unless-stopped

  panel-web:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./services/panel-web/public:/usr/share/nginx/html:ro

volumes:
  pg_data:
