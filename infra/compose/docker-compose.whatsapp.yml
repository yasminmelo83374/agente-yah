services:
  whatsapp-gateway:
    build:
      context: ./services/whatsapp-gateway
    environment:
      ORCHESTRATOR_API_URL: http://orchestrator-api:8080
      WHATSAPP_SESSION_DIR: /app/sessions
      WHATSAPP_OWNER_JID: ${WHATSAPP_OWNER_JID:-}
      NODE_OPTIONS: --max-old-space-size=512
    volumes:
      - whatsapp_sessions:/app/sessions
    depends_on:
      - orchestrator-api
    profiles: ["whatsapp"]

volumes:
  whatsapp_sessions:
